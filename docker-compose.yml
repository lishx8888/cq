version: '3.8'

services:
  backend:
    image: yourusername/cq-backend:latest
    container_name: cq-backend
    ports:
      - "5008:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    restart: unless-stopped
    networks:
      - cq-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: yourusername/cq-frontend:latest
    container_name: cq-frontend
    ports:
      - "5080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cq-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  cq-network:
    driver: bridge